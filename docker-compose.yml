version: '3.9'

services:

  Postgres:
    image: postgres:17
    container_name: Postgrsql
    shm_size: 128mb

    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: mydb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  Redis:
    image: redis:7
    container_name: my_redis

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: